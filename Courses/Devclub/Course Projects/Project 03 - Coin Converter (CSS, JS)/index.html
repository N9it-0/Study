<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="scripts.js" defer></script>
    <title>Coin Converter</title>
</head>

<body>
    <img src="./img/Logo.gif" alt="Site-Logo" id="site-logo">
    <main>

        <label>
            <p class="texto-pequeno">Converter <b>de</b></p>
            <select id="currency-select-base">
                <option>R$ Real Brasileiro</option>
            </select>
        </label>

        <label>
            <p class="texto-pequeno">Converter <b>para</b></p>
            <select id="currency-select-cvt">
                <option value="dolar">US$ Dólar Americano</option>
                <option value="euro">€ Euro</option>
                <option value="libra">£ Libra</option>
                <option value="bitcoin">Bitcoin</option>
            </select>
        </label>

        <label>
            <p class="texto-pequeno"><b>Valor</b></p>
            <input placeholder="R$ 10.000,00" id="input-currency">
        </label>

        <button id="convert-button">Converter</button>

        <section>
            <div class="currency-box">
                <img src="./img/Coins/BRL.png" alt="Coin-To-Convert">
                <p class="currency">Real</p>
                <p id="currency-value-to-convert">R$ 0,00</p>
            </div>

            <img src="./img/Down-Arrow.png" alt="Down-Arrow" id="arrow-img">

            <div class="currency-box">
                <img src="./img/Coins/USD.png" alt="Converted-Coin" id="img-cc">
                <p id="currency-name">Dólar Americano</p>
                <p id="currency-value-converted">R$ 0,00</p>
            </div>
        </section>

    </main>
</body>

</html>
